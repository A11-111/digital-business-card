<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣熊 | 電子名片</title>
    <style>
        :root {
            --primary-color: #1a2a6c;
            --accent-color: #f2a900;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            width: 90%;
            max-width: 350px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            padding: 30px 20px;
            overflow: hidden;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-color);
            margin-bottom: 15px;
        }
        h1 { margin: 10px 0 5px; color: #333; font-size: 1.6rem; }
        p.title { color: var(--primary-color); font-weight: bold; margin-bottom: 5px; }
        p.company { color: #777; font-size: 0.9rem; margin-top: 0; }
        
        .contact-info {
            margin: 20px 0;
            text-align: left;
            font-size: 0.9rem;
            color: #555;
        }
        .info-item { margin: 8px 0; padding-left: 10px; border-left: 3px solid var(--accent-color); }

        .btn-container { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        
        .btn {
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            display: block;
            cursor: pointer;
            border: none;
        }
        .btn-vcf { background-color: var(--primary-color); color: white; }
        .btn-vcf:hover { background-color: #0d1a4a; }
        .btn-web { background-color: #eee; color: #333; }
        
        .footer { margin-top: 20px; font-size: 0.7rem; color: #bbb; }
    </style>
</head>
<body>

<div class="card">
    <img src="headshot.jpg" alt="台灣熊" class="profile-img">
    
    <h1>台灣熊</h1>
    <p class="title">高級幹員</p>
    <p class="company">台灣最大股份無限公司</p>

    <div class="contact-info">
        <div class="info-item">📞 0999-999-999</div>
        <div class="info-item">✉️ taiwanbear@teamtw.com</div>
        <div class="info-item">🌐 www.team-taiwan.com</div>
    </div>

    <div class="btn-container">
        <a href="contact.vcf" download="taiwan-bear.vcf" class="btn btn-vcf">
            📥 加入至聯絡人 (iOS / Android / Outlook)
        </a>
        <a href="https://www.team-taiwan.com" target="_blank" class="btn btn-web">
            瀏覽官方網站
        </a>
    </div>

    <div class="footer">掃描 QR Code 快速儲存資訊</div>
</div>

</body>
</html>
